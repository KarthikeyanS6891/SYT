services:
  mongo:
    image: mongo:7
    container_name: syt-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: syt-backend
    restart: unless-stopped
    depends_on:
      - mongo
    env_file: ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/syt_marketplace
      PORT: 5000
      NODE_ENV: production
      CORS_ORIGINS: http://localhost,http://localhost:80
      PUBLIC_URL: http://localhost:5000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "5000:5000"
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api/v1
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    container_name: syt-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mongo_data:
  backend_uploads:
